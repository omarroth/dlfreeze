name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  RELEASE_NAME: dlfreeze-linux-x86_64

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build and test
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release artifacts
        run: |
          make clean
          make

      - name: Package release archive
        run: |
          mkdir -p dist/${RELEASE_NAME}
          cp build/dlfreeze dist/${RELEASE_NAME}/
          cp build/dlfreeze-bootstrap dist/${RELEASE_NAME}/
          cp build/dlfreeze-preload.so dist/${RELEASE_NAME}/
          cp README.md CONTRIBUTING.md PUBLISHING.md dist/${RELEASE_NAME}/
          tar -C dist -czf dist/${RELEASE_NAME}.tar.gz ${RELEASE_NAME}
          sha256sum dist/${RELEASE_NAME}.tar.gz > dist/${RELEASE_NAME}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/${{ env.RELEASE_NAME }}.tar.gz
            dist/${{ env.RELEASE_NAME }}.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Extract release notes from tag
        id: notes
        run: |
          # Re-fetch the tag to ensure the annotated tag object is present
          git fetch origin tag "${GITHUB_REF_NAME}" --force --no-tags
          NOTES=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          if [ -z "$NOTES" ]; then
            NOTES=$(git log -1 --format='%B' "${GITHUB_REF_NAME}")
          fi
          {
            echo 'RELEASE_NOTES<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          files: |
            dist/${{ env.RELEASE_NAME }}.tar.gz
            dist/${{ env.RELEASE_NAME }}.sha256
